name: Go CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23' 

          check-latest: true
          cache: true 

      - name: Install dependencies
        run: go mod download

      - name: Run Vet & Static Check
        run: go vet ./...

      - name: Build
        run: go build -v ./...

      - name: Run Tests
        run: go test -v -race ./...

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.txt
          fail_ci_if_error: false